version: "3.9"

services:
  api:
    build: .
    container_name: store_intelligence_api
    ports:
      - "8000:8000"
    volumes:
      - ./store_layout.json:/app/store_layout.json:ro
      - db_data:/tmp
    environment:
      - LOG_LEVEL=info
      - STORE_ID=STORE_PURPLLE_001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  dashboard:
    build: .
    container_name: store_intelligence_dashboard
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_URL=http://api:8000
      - STORE_ID=STORE_PURPLLE_001
    command: >
      python dashboard/live_dashboard.py
      --store STORE_PURPLLE_001
      --api http://api:8000
      --refresh 5
    restart: unless-stopped

volumes:
  db_data:
